version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/heyama-exam
      - PORT=3000
      # --- CONFIGURATION S3 (MINIO) ---
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=heyama-bucket
      - S3_PUBLIC_URL=http://localhost:9000/heyama-bucket
      - S3_REGION=us-east-1
    depends_on:
      - mongo
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001" 
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # URL locale du backend pour l'environnement Docker Compose
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      # Si tu souhaites cibler le backend distant sur Vercel à la place, utilise :
      # - NEXT_PUBLIC_API_URL=https://exam-heyama.vercel.app
    depends_on:
      - backend

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-18T22-51-28Z
    ports:
      - "9000:9000" # API S3
      - "9001:9001" 
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # --- CRÉATION AUTOMATIQUE DU BUCKET ---
  createbuckets:
    image: quay.io/minio/mc:RELEASE.2024-01-16T16-06-34Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin) do echo 'En attente de MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/heyama-bucket --ignore-existing;
      /usr/bin/mc anonymous set public myminio/heyama-bucket;
      exit 0;
      "

volumes:
  mongo-data:
  minio-data: